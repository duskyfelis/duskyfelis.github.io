<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-Now · duskyfelis</title>
    <link rel="stylesheet" href="styles.css">
        <script src="scripts/autoload.js" defer></script>
    <link rel="icon" type="image/png" sizes="16x16" href="favicon.ico">
</head>
<body>
<div class="container">
<!-- QR-Now page -->
<div class="hero qr-hero">
    <div class="hero-icon-large">📱</div>
    <h1>QR-Now</h1>
    <div class="subtitle">Instant QR codes from any webpage. Click, scan, go. No tracking, open source.</div>
    <div class="hero-buttons">
        <a href="https://github.com/duskyfelis/QR-Now" class="hero-button hero-button-secondary">GitHub →</a>
    </div>
</div>
        <!-- Browsers -->
        <h2 style="font-size: 2rem; text-align: center; margin: 3rem 3rem;">Available for</h2>
        <div class="browser-grid">
            <div class="browser-card">
                <div class="browser-icon">🔵</div>
                <div class="browser-name">Chrome</div>
                <a href="https://github.com/duskyfelis/QR-Now/QR-Now_Chrome.zip" class="browser-link">Add</a>
            </div>
            <div class="browser-card">
                <div class="browser-icon">🦊</div>
                <div class="browser-name">Firefox</div>
                <a href="https://github.com/duskyfelis/QR-Now/QR-Now_Firefox.zip" class="browser-link">Add</a>
            </div>
            <div class="browser-card">
                <div class="browser-icon">🌐</div>
                <div class="browser-name">Edge</div>
                <a href="https://github.com/duskyfelis/QR-Now/QR-Now_Edge.zip" class="browser-link">Add</a>
            </div>
        </div>
</div>
</div>
</body>
</html>
